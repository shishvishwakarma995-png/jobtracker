{% extends 'base.html' %}

{% block title %}Delete Application — Job Tracker{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card p-4 text-center">
      <i class="bi bi-trash3 fs-1 text-danger mb-3"></i>
      <h5 class="fw-bold mb-2">Delete this application?</h5>
      <p class="text-muted mb-1">
        <strong>{{ object.role }}</strong> at <strong>{{ object.company }}</strong>
      </p>
      <p class="text-muted small mb-4">This action cannot be undone.</p>

      <form method="post">
        {% csrf_token %}
        <div class="d-flex gap-2 justify-content-center">
          <button type="submit" class="btn btn-danger">
            <i class="bi bi-trash me-1"></i> Yes, Delete
          </button>
          <a href="{% url 'job-list' %}" class="btn btn-outline-secondary">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
